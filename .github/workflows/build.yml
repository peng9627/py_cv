name: Release QRScanner

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            artifact_name: qrcode_scanner-windows-x64.zip
            cmake_flags: "-DVCPKG_TARGET_TRIPLET=x64-windows-static"

          - os: macos-latest
            target: macos-arm64
            artifact_name: qrcode_scanner-macos-arm64.zip
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          - os: macos-15-intel
            target: macos-x64
            artifact_name: qrcode_scanner-macos-x64.zip
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

          - os: ubuntu-latest
            target: linux-x64
            artifact_name: qrcode_scanner-linux-x64.zip
            cmake_flags: ""

          - os: ubuntu-latest
            target: linux-arm64
            artifact_name: qrcode_scanner-linux-arm64.zip
            cmake_flags: -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.target }}" = "linux-arm64" ]; then
            sudo dpkg --add-architecture arm64
            sudo rm -f /etc/apt/sources.list.d/*
            sudo mv /etc/apt/sources.list /etc/apt/sources.list.bak
            UBUNTU_VERSION=$(lsb_release -cs)
            echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ ${UBUNTU_VERSION} main universe" | sudo tee /etc/apt/sources.list
            echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ ${UBUNTU_VERSION}-updates main universe" | sudo tee -a /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${UBUNTU_VERSION} main universe" | sudo tee -a /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${UBUNTU_VERSION}-updates main universe" | sudo tee -a /etc/apt/sources.list
            sudo apt-get update --fix-missing
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libopencv-dev:arm64
            echo "EXTRA_CMAKE_VARS=-DOpenCV_DIR=/usr/lib/aarch64-linux-gnu/cmake/opencv4" >> $GITHUB_ENV
          else
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build libopencv-dev
            echo "EXTRA_CMAKE_VARS=" >> $GITHUB_ENV
          fi

      # 【终极修复】强制从源码编译，确保兼容性和依赖完整性
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          export MACOSX_DEPLOYMENT_TARGET=10.15
          brew install opencv --build-from-source

      - name: Cache vcpkg dependencies
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ matrix.cmake_flags }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install and Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install "opencv4[contrib,dnn]:x64-windows-static"
          $TOOLCHAIN_FILE = "$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake"
          Write-Host "Using toolchain file: $TOOLCHAIN_FILE"
          if (-not (Test-Path $TOOLCHAIN_FILE)) {
            Write-Error "FATAL: Toolchain file not found at $TOOLCHAIN_FILE"
            exit 1
          }
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" `
            "${{ matrix.cmake_flags }}"

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }} ${{ env.EXTRA_CMAKE_VARS }}

      - name: Build Project
        run: cmake --build build --config Release

      - name: Package (Unix/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          find build -name "wechat_scanner" -exec cp {} release/ \;
          
          if [ "${{ runner.os }}" = "macOS" ]; then
            chmod +x .github/scripts/bundle_macos.sh
            .github/scripts/bundle_macos.sh
          fi

          if [ "${{ matrix.target }}" = "linux-x64" ]; then
             cp /usr/lib/x86_64-linux-gnu/libopencv*.so* release/ 2>/dev/null || true
          elif [ "${{ matrix.target }}" = "linux-arm64" ]; then
             cp /usr/lib/aarch64-linux-gnu/libopencv*.so* release/ 2>/dev/null || true
          fi

          if [ -d "models" ]; then
            cp -r models release/
          elif [ -d "build/models" ]; then
            cp -r build/models release/
          else
            echo "Error: 'models' directory not found."
            exit 1
          fi
          
          echo "--- Contents of release directory before zipping ---"
          ls -lR release
          cd release
          zip -r ../${{ matrix.artifact_name }} .
          cd ..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Get-ChildItem -Path build/Release -Filter *.exe -Recurse | Copy-Item -Destination release/
          if (Test-Path "models") {
            Copy-Item -Recurse models release/
          } elseif (Test-Path "build/Release/models") {
            Copy-Item -Recurse build/Release/models release/
          } else {
            Write-Error "Error: 'models' directory not found."
            exit 1
          }
          Compress-Archive -Path release/* -DestinationPath ${{ matrix.artifact_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: qrcode_scanner-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
